{
  "openapi": "3.1.0",
  "info": {
    "title": "File Service API",
    "description": "Upload, metadata, download and remove files stored in MinIO/S3.",
    "version": "0.0.1"
  },
  "servers": [
    {
      "url": "http://localhost:8081",
      "description": "Generated server url"
    }
  ],
  "paths": {
    "/api/files": {
      "get": {
        "tags": [
          "file-controller"
        ],
        "operationId": "list",
        "parameters": [
          {
            "name": "format",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "JSON",
                "XML",
                "CSV"
              ]
            }
          },
          {
            "name": "kind",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "SOURCE",
                "RESULT"
              ]
            }
          },
          {
            "name": "page",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 0
            }
          },
          {
            "name": "size",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 20
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/PageResponseDtoFileMetadataResponseDto"
                }
              }
            }
          }
        }
      },
      "post": {
        "tags": [
          "file-controller"
        ],
        "operationId": "upload",
        "parameters": [
          {
            "name": "format",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "JSON",
                "XML",
                "CSV"
              ]
            }
          },
          {
            "name": "kind",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "SOURCE",
                "RESULT"
              ]
            }
          }
        ],
        "requestBody": {
          "content": {
            "multipart/form-data": {
              "schema": {
                "type": "object",
                "properties": {
                  "file": {
                    "type": "string",
                    "format": "binary"
                  }
                },
                "required": [
                  "file"
                ]
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/FileUploadResponseDto"
                }
              }
            }
          }
        }
      }
    },
    "/api/files/{fileId}": {
      "get": {
        "tags": [
          "file-controller"
        ],
        "operationId": "getMetadata",
        "parameters": [
          {
            "name": "fileId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/FileMetadataResponseDto"
                }
              }
            }
          }
        }
      },
      "delete": {
        "tags": [
          "file-controller"
        ],
        "operationId": "remove",
        "parameters": [
          {
            "name": "fileId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK"
          }
        }
      }
    },
    "/api/files/{fileId}/schema": {
      "get": {
        "tags": [
          "file-controller"
        ],
        "operationId": "getSchema",
        "parameters": [
          {
            "name": "fileId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "*/*": {
                "schema": {
                  "$ref": "#/components/schemas/SchemaTreeResponseDto"
                }
              }
            }
          }
        }
      }
    },
    "/api/files/{fileId}/content": {
      "get": {
        "tags": [
          "file-controller"
        ],
        "operationId": "download",
        "parameters": [
          {
            "name": "fileId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "*/*": {
                "schema": {
                  "type": "string",
                  "format": "binary"
                }
              }
            }
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "FileUploadResponseDto": {
        "type": "object",
        "properties": {
          "fileId": {
            "type": "string",
            "format": "uuid"
          },
          "originalName": {
            "type": "string"
          },
          "format": {
            "type": "string",
            "enum": [
              "JSON",
              "XML",
              "CSV"
            ]
          },
          "size": {
            "type": "integer",
            "format": "int64"
          },
          "contentType": {
            "type": "string"
          }
        }
      },
      "FileMetadataResponseDto": {
        "type": "object",
        "properties": {
          "fileId": {
            "type": "string",
            "format": "uuid"
          },
          "originalName": {
            "type": "string"
          },
          "storageKey": {
            "type": "string"
          },
          "format": {
            "type": "string",
            "enum": [
              "JSON",
              "XML",
              "CSV"
            ]
          },
          "kind": {
            "type": "string",
            "enum": [
              "SOURCE",
              "RESULT"
            ]
          },
          "size": {
            "type": "integer",
            "format": "int64"
          },
          "contentType": {
            "type": "string"
          },
          "metadata": {
            "type": "object",
            "additionalProperties": {
              "type": "string"
            }
          },
          "createdAt": {
            "type": "string",
            "format": "date-time"
          }
        }
      },
      "PageResponseDtoFileMetadataResponseDto": {
        "type": "object",
        "properties": {
          "items": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/FileMetadataResponseDto"
            }
          },
          "page": {
            "type": "integer",
            "format": "int32"
          },
          "size": {
            "type": "integer",
            "format": "int32"
          },
          "total": {
            "type": "integer",
            "format": "int64"
          }
        }
      },
      "SchemaNodeDto": {
        "type": "object",
        "properties": {
          "name": {
            "type": "string"
          },
          "path": {
            "type": "string"
          },
          "type": {
            "type": "string",
            "enum": [
              "OBJECT",
              "ARRAY",
              "STRING",
              "INTEGER",
              "DECIMAL",
              "BOOLEAN",
              "NULL",
              "UNKNOWN"
            ]
          },
          "sampleValue": {
            "type": "string"
          },
          "arrayItemType": {
            "type": "string",
            "enum": [
              "OBJECT",
              "ARRAY",
              "STRING",
              "INTEGER",
              "DECIMAL",
              "BOOLEAN",
              "NULL",
              "UNKNOWN"
            ]
          },
          "children": {
            "type": "array",
            "items": {

            }
          }
        }
      },
      "SchemaTreeResponseDto": {
        "type": "object",
        "properties": {
          "fileId": {
            "type": "string",
            "format": "uuid"
          },
          "format": {
            "type": "string",
            "enum": [
              "JSON",
              "XML",
              "CSV"
            ]
          },
          "root": {
            "$ref": "#/components/schemas/SchemaNodeDto"
          }
        }
      }
    }
  }
}